<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>系统管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial; margin:18px; }
    .top{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .pill{display:inline-block; padding:6px 10px; border:1px solid #ddd; border-radius:999px; text-decoration:none; color:inherit;}
    .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; margin-top:14px;}
    .card{border:1px solid #ddd; border-radius:14px; padding:12px;}
    .muted{opacity:.65;}
    .badge{margin-left:8px; padding:2px 8px; border:1px solid #e0a800; border-radius:999px; font-size:12px; opacity:.85;}
    .title{font-weight:700;}
    .path{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; font-size:12px; opacity:.75; margin-top:4px;}
  </style>
</head>
<body>
  <div class="top">
    <div style="font-size:20px; font-weight:800;">系统管理</div>
    <a class="pill" href="/hub">返回 Hub</a>
  </div>

  {% if sys_items is not none %}
  <div class="grid">
    {% for it in sys_items %}
      <div class="card {% if it.status != 'active' %}muted{% endif %}">
        <div class="title">
          {{ it.title or it.key }}
          {% if it.requires %}<span class="badge">需权限</span>{% endif %}
          {% if it.status == 'stub' %}<span class="badge">待接线</span>{% endif %}
        </div>
        <div class="path">{{ it.path }}</div>
        <div style="margin-top:10px;">
          {% if it.status == 'active' %}
            <a class="pill" href="{{ it.path }}">进入</a>
          {% else %}
            <span class="pill muted">不可用</span>
          {% endif %}
        </div>
      </div>
    {% endfor %}
  </div>
  {% else %}
    <div style="margin-top:14px; opacity:.8;">未加载到系统管理模块清单。</div>
  {% endif %}
</body>
</html>
