{% extends "layout.html" %}
{% block title %}Layout{% endblock %}
{% block head_extra %}
<style>
/* UI-UNIFY-LAYOUT-01: defensive hide for legacy sidebar/toggle remnants (page-local) */
button.toggle, button.sidebar-toggle, button.menu-toggle, button.nav-toggle,
a.toggle, a.sidebar-toggle, a.menu-toggle, a.nav-toggle {
  display: none !important;
}
</style>
{% endblock %}

{% block content %}
<div class="app">
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <div class="logo">X</div>
      <div class="text">
        <div class="name">心易智能</div>
        <div class="sub">Xinyi AI 财务系统</div>
      </div>
    </div>

    <div class="top-actions">
      <a class="btn-icon" href="/hub" title="Hub">Hub</a>
      <button class="btn-icon" id="btnToggle" type="button" title="关闭/展开侧栏">⟷</button>
    </div>
    <div style="margin-top:10px; padding:0 6px;" id="sidebarSearchWrap">
      <input id="sidebarSearch" type="text" placeholder="搜索菜单…"
        style="width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:12px; font-size:13px; outline:none;">
    </div>


    {% include "_sidebar.html" %}
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

<script>
(function(){
  try{
    const key="xinyi_sidebar_compact";
    const sb=document.getElementById("sidebar");
    const btn=document.getElementById("btnToggle");
    const saved=localStorage.getItem(key);
    if(saved==="1"){ sb.classList.add("compact"); }
    btn && btn.addEventListener("click", function(){
      sb.classList.toggle("compact");
      localStorage.setItem(key, sb.classList.contains("compact") ? "1" : "0");
    });
  }catch(e){}
})();
</script>

<script>
/* UI-LAYOUT-03 nav active + recent */
(function(){
  try{
    const RECENT_KEY_CANDIDATES = ["xinyi_hub_recent", "hub_recent", "xinyi_recent"]; // try to reuse hub key
    function loadRecent(){
      for(const k of RECENT_KEY_CANDIDATES){
        const raw = localStorage.getItem(k);
        if(raw){
          try{
            const arr = JSON.parse(raw);
            if(Array.isArray(arr)) return {key:k, arr:arr};
          }catch(e){}
        }
      }
      return {key:RECENT_KEY_CANDIDATES[0], arr:[]};
    }
    function saveRecent(key, arr){
      try{ localStorage.setItem(key, JSON.stringify(arr.slice(0, 20))); }catch(e){}
    }

    // 1) active highlight
    const curPath = (location.pathname || "/").replace(/\/+$/,"") || "/";
    document.querySelectorAll('.nav a.nav-item[data-nav-path]').forEach(function(a){
      const p = (a.getAttribute('data-nav-path') || "").replace(/\/+$/,"");
      if(!p) return;
      if(p === curPath){
        a.style.background = "var(--hover)";
        a.style.border = "1px solid var(--border)";
        a.style.fontWeight = "700";
      }
    });

    // 2) update recent on page view (only for real routes, not #)
    const {key, arr} = loadRecent();
    if(curPath !== "/favicon.ico" && curPath !== "#"){
      // title: try from h1, else document.title
      const h1 = document.querySelector("h1");
      const title = (h1 && h1.textContent && h1.textContent.trim()) ? h1.textContent.trim() : (document.title || curPath);
      const item = {path: curPath, title: title, ts: Date.now()};
      const filtered = arr.filter(x => x && x.path !== curPath);
      filtered.unshift(item);
      saveRecent(key, filtered);
    }

    // 3) render recent in sidebar
    const recentBlock = document.querySelector('[data-recent-block="1"]');
    const list = document.querySelector('[data-recent-list="1"]');
    const now = loadRecent(); // reload after update
    const items = (now.arr || []).slice(0, 6);

    if(recentBlock && list){
      if(items.length === 0){
        recentBlock.style.display="none";
      }else{
        recentBlock.style.display="";
        list.innerHTML="";
        items.forEach(function(it){
          const a=document.createElement("a");
          a.className="nav-item";
          a.href=it.path || "#";
          a.setAttribute("data-nav-path", it.path || "");
          a.innerHTML = '<span class="left"><span class="dot active"></span><span class="label"></span></span>';
          const label=a.querySelector(".label");
          if(label) label.textContent = it.title || it.path || "(untitled)";
          list.appendChild(a);
        });
      }
    }
  }catch(e){}
})();
</script>


<script>
/* UI-LAYOUT-04 sidebar search + collapse */
(function(){
  try{
    const KEY_COLLAPSE = "xinyi_sidebar_group_collapse";
    function loadCollapse(){
      try{ return JSON.parse(localStorage.getItem(KEY_COLLAPSE) || "{}") || {}; }catch(e){ return {}; }
    }
    function saveCollapse(obj){
      try{ localStorage.setItem(KEY_COLLAPSE, JSON.stringify(obj||{})); }catch(e){}
    }

    // 1) group collapse toggle
    const state = loadCollapse();
    document.querySelectorAll('.nav-group[data-nav-group]').forEach(function(g){
      const name = g.getAttribute("data-nav-group") || "";
      const title = g.querySelector(".nav-group-title");
      if(title){
        title.style.cursor="pointer";
        title.title="点击折叠/展开";
        title.addEventListener("click", function(){
          const now = !(state[name] === true);
          state[name] = now; // true means collapsed
          saveCollapse(state);
          apply();
        });
      }
    });

    function apply(){
      document.querySelectorAll('.nav-group[data-nav-group]').forEach(function(g){
        const name = g.getAttribute("data-nav-group") || "";
        const collapsed = state[name] === true;
        g.querySelectorAll(".nav-item").forEach(function(it){
          it.style.display = collapsed ? "none" : "";
        });
      });
    }
    apply();

    // 2) sidebar search filter
    const input = document.getElementById("sidebarSearch");
    function filter(){
      const q = (input && input.value ? input.value.trim().toLowerCase() : "");
      const groups = document.querySelectorAll('.nav-group[data-nav-group]');
      groups.forEach(function(g){
        let any=false;
        g.querySelectorAll(".nav-item").forEach(function(it){
          const label = (it.querySelector(".label") && it.querySelector(".label").textContent) ? it.querySelector(".label").textContent.trim().toLowerCase() : "";
          const hit = !q || label.includes(q);
          it.style.display = hit ? "" : "none";
          if(hit) any=true;
        });
        // show group title if any item hit; keep "最近" block handled elsewhere
        const t = g.querySelector(".nav-group-title");
        if(t){ t.style.display = any ? "" : "none"; }
      });
    }
    if(input){
      input.addEventListener("input", filter);
      // allow escape to clear
      input.addEventListener("keydown", function(e){
        if(e.key === "Escape"){ input.value=""; filter(); }
      });
    }
  }catch(e){}
})();
</script>
{% endblock %}
