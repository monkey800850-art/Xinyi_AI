{% extends "main_layout.html" %}
{% block page_title %}工资管理{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/payroll.css') }}">
{% endblock %}
{% block content %}
<div class="payroll-page">
  <section class="payroll-card">
    <h2>工资管理（编制 / 计税 / 发放 / 凭证）</h2>
    <div class="payroll-grid">
      <div class="payroll-field">
        <label>账套ID</label>
        <input id="book-id" type="number" value="1" />
      </div>
      <div class="payroll-field">
        <label>期间（YYYY-MM）</label>
        <input id="period" type="month" />
      </div>
      <div class="payroll-field">
        <label>操作人（X-User）</label>
        <input id="operator" value="uat_admin" />
      </div>
      <div class="payroll-field">
        <label>角色（X-Role）</label>
        <select id="role">
          <option value="payroll">payroll</option>
          <option value="hr">hr</option>
          <option value="cashier">cashier</option>
          <option value="admin">admin</option>
          <option value="auditor">auditor</option>
          <option value="employee">employee</option>
        </select>
      </div>
      <div class="payroll-field">
        <label>操作人ID（可选）</label>
        <input id="operator-id" type="number" placeholder="如 1001" />
      </div>
      <div class="payroll-field">
        <label>期间ID（封账/反封）</label>
        <input id="period-id" type="number" placeholder="查询期间后填入" />
      </div>
      <div class="payroll-field">
        <label>工资单ID（计税/发放/凭证）</label>
        <input id="slip-id" type="number" placeholder="查询工资单后填入" />
      </div>
      <div class="payroll-field">
        <label>批次ID（导出银行文件）</label>
        <input id="batch-id" type="number" placeholder="查询批次后填入" />
      </div>
    </div>
  </section>

  <section class="payroll-card">
    <h3>1) 工资期间</h3>
    <div class="payroll-grid">
      <div class="payroll-field">
        <label>期间状态</label>
        <select id="period-status">
          <option value="open">open</option>
          <option value="closed">closed</option>
        </select>
      </div>
    </div>
    <div class="payroll-actions">
      <button id="btn-period-upsert" class="payroll-btn" type="button">保存期间</button>
      <button id="btn-period-list" class="payroll-btn" type="button">查询期间</button>
      <button id="btn-period-close" class="payroll-btn" type="button">封账</button>
      <button id="btn-period-reopen" class="payroll-btn" type="button">反封账</button>
    </div>
  </section>

  <section class="payroll-card">
    <h3>2) 编制工资单</h3>
    <div class="payroll-grid">
      <div class="payroll-field">
        <label>员工ID</label>
        <input id="employee-id" type="number" value="1001" />
      </div>
      <div class="payroll-field">
        <label>员工姓名</label>
        <input id="employee-name" value="测试员工" />
      </div>
      <div class="payroll-field">
        <label>部门</label>
        <input id="department" value="财务部" />
      </div>
      <div class="payroll-field">
        <label>城市</label>
        <input id="city" value="上海" />
      </div>
      <div class="payroll-field">
        <label>银行卡号</label>
        <input id="bank-account" value="6222020000001001" />
      </div>
      <div class="payroll-field">
        <label>考勤引用</label>
        <input id="attendance-ref" placeholder="可选" />
      </div>
      <div class="payroll-field">
        <label>出勤天数</label>
        <input id="attendance-days" type="number" value="21" />
      </div>
      <div class="payroll-field">
        <label>缺勤天数</label>
        <input id="absent-days" type="number" value="0" />
      </div>
      <div class="payroll-field">
        <label>基本工资</label>
        <input id="gross-amount" type="number" step="0.01" value="15000" />
      </div>
      <div class="payroll-field">
        <label>奖金</label>
        <input id="bonus-amount" type="number" step="0.01" value="0" />
      </div>
      <div class="payroll-field">
        <label>加班费</label>
        <input id="overtime-amount" type="number" step="0.01" value="0" />
      </div>
      <div class="payroll-field">
        <label>其他扣款</label>
        <input id="deduction-amount" type="number" step="0.01" value="0" />
      </div>
      <div class="payroll-field">
        <label>社保（0=按政策自动）</label>
        <input id="social-insurance" type="number" step="0.01" value="0" />
      </div>
      <div class="payroll-field">
        <label>公积金（0=按政策自动）</label>
        <input id="housing-fund" type="number" step="0.01" value="0" />
      </div>
      <div class="payroll-field">
        <label>计税方式</label>
        <select id="tax-method">
          <option value="cumulative">cumulative</option>
          <option value="monthly">monthly</option>
        </select>
      </div>
    </div>
    <div class="payroll-actions">
      <button id="btn-slip-upsert" class="payroll-btn primary" type="button">编制/更新工资单</button>
      <button id="btn-slip-list" class="payroll-btn" type="button">查询工资单</button>
      <button id="btn-slip-confirm" class="payroll-btn" type="button">计税确认</button>
    </div>
  </section>

  <section class="payroll-card">
    <h3>3) 发放与凭证</h3>
    <div class="payroll-grid">
      <div class="payroll-field">
        <label>批次工资单ID列表（可选，逗号分隔）</label>
        <input id="batch-slip-ids" placeholder="例如：101,102,103" />
      </div>
      <div class="payroll-field">
        <label>凭证号（自动凭证可选）</label>
        <input id="voucher-no" placeholder="可不填" />
      </div>
    </div>
    <div class="payroll-actions">
      <button id="btn-payment-create" class="payroll-btn" type="button">创建发放申请</button>
      <button id="btn-payment-status" class="payroll-btn" type="button">查询发放状态</button>
      <button id="btn-batch-create" class="payroll-btn" type="button">生成发放批次</button>
      <button id="btn-batch-list" class="payroll-btn" type="button">查询发放批次</button>
      <button id="btn-bank-export" class="payroll-btn" type="button">导出银行文件</button>
      <button id="btn-voucher-suggest" class="payroll-btn" type="button">工资凭证建议</button>
      <button id="btn-voucher-create" class="payroll-btn primary" type="button">自动生成工资凭证</button>
    </div>
    <p class="payroll-msg" id="payroll-msg">状态：待操作</p>
  </section>

  <section class="payroll-card">
    <h3>接口结果</h3>
    <pre id="payroll-result" class="payroll-result">{"ok": true, "message": "ready"}</pre>
  </section>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/payroll.js') }}"></script>
{% endblock %}
