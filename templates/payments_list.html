{% extends "main_layout.html" %}
{% block page_title %}支付申请列表{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/payments.css" />
{% endblock %}
{% block content %}
<div class="pay-page">
      <header class="pay-header">
        <div>
          <h1>支付申请列表</h1>
          <p>创建、审批与执行</p>
        </div>
        <div class="pay-actions">
          <a class="btn" href="/payments/new">新建支付申请</a>
        </div>
      </header>

      <section class="pay-card">
        <div class="filter-grid">
          <div class="field">
            <label>账套ID</label>
            <input type="number" class="field-input" id="pay-book-id" value="1" />
          </div>
          <div class="field">
            <label>状态</label>
            <select class="field-input" id="pay-status">
              <option value="">全部</option>
              <option value="draft">草稿</option>
              <option value="pending">待审批</option>
              <option value="in_review">审批中</option>
              <option value="approved">审批通过</option>
              <option value="rejected">审批驳回</option>
              <option value="to_pay">待支付</option>
              <option value="paid">已支付</option>
              <option value="reconciled">已对账</option>
            </select>
          </div>
          <div class="field">
            <label>操作人</label>
            <input type="text" class="field-input" id="pay-operator" placeholder="张三" />
          </div>
          <div class="field">
            <label>角色</label>
            <select class="field-input" id="pay-role">
              <option value="">无</option>
              <option value="approver">审批人</option>
              <option value="cashier">出纳</option>
              <option value="admin">管理员</option>
            </select>
          </div>
        </div>
        <div class="filter-actions">
          <button class="btn" id="pay-query">查询</button>
          <button class="btn secondary" id="pay-export">导出</button>
        </div>
        <div id="pay-error" class="pay-error hidden"></div>
      </section>

      <section class="pay-card">
        <h2>列表</h2>
        <table id="pay-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>收款人</th>
              <th>方式</th>
              <th>金额</th>
              <th>状态</th>
              <th>关联报销</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="pay-body"></tbody>
        </table>
      </section>
    </div>
{% endblock %}
{% block extra_js %}
<script src="/static/js/payments.js"></script>
{% endblock %}
