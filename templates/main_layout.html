<!doctype html>
<html lang="zh-CN">

  <title>{% block page_title %}Xinyi AI{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;

</html>
