name: ci-uat

on:
  push:
  pull_request:

jobs:
  uat:
    runs-on: ubuntu-latest
    env:
      NO_PROXY_OPT: "--noproxy '*'"
      HOST: "127.0.0.1"
      PORT: "5000"
      BASE_URL: "http://127.0.0.1:5000"
      OUT: "/tmp/evidence_uat_run_ci.txt"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            echo "[WARN] requirements.txt not found; skipping pip install"
          fi

      - name: Prepare runtime dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p var/run var/log

      - name: Start app
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/start_app.sh | tee /tmp/evidence_start_app_ci.txt

      - name: Run uat_run (anonymous)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/uat_run.sh | tee "${OUT}"

      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-uat-evidence
          path: |
            /tmp/evidence_start_app_ci.txt
            /tmp/evidence_uat_run_ci.txt
