name: ci-release-gate

on:
  push:
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate - secrets (reuse local gate script on simulated staged)
        shell: bash
        run: |
          set -euo pipefail
          # simulate "staged diff": use patch of this change set
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
            git diff -U0 "${base}...${head}" -- . ':(exclude)scripts/ops/secrets_patterns.txt' > /tmp/ci_diff.patch
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              git diff -U0 HEAD~1..HEAD -- . ':(exclude)scripts/ops/secrets_patterns.txt' > /tmp/ci_diff.patch
            else
              git show -U0 --pretty=format: HEAD -- . ':(exclude)scripts/ops/secrets_patterns.txt' > /tmp/ci_diff.patch
            fi
          fi

          test -f scripts/ops/secrets_patterns.txt
          awk 'NF && $0 !~ /^[[:space:]]*#/' scripts/ops/secrets_patterns.txt > /tmp/ci_secrets_patterns.txt
          rg -n -f /tmp/ci_secrets_patterns.txt /tmp/ci_diff.patch >/dev/null && { echo "[FAIL] secret-like pattern in diff"; exit 1; } || true
          echo "[OK] secrets gate passed"

      - name: Setup Python (if needed by app)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            echo "[WARN] requirements.txt not found; skipping pip install"
          fi

      - name: Start app + health_check (smoke baseline)
        shell: bash
        env:
          NO_PROXY_OPT: "--noproxy '*'"
          HOST: "127.0.0.1"
          PORT: "5000"
          BASE_URL: "http://127.0.0.1:5000"
        run: |
          set -euo pipefail
          bash scripts/ops/start_app.sh | tee /tmp/evidence_start_app.txt
          bash scripts/ops/health_check.sh | tee /tmp/evidence_health_check.txt

      - name: Upload release gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-gate-evidence
          path: |
            /tmp/evidence_start_app.txt
            /tmp/evidence_health_check.txt
