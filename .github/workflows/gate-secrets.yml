name: gate-secrets

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build diff patch
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] event=${GITHUB_EVENT_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            # PR: base...HEAD diff
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
            echo "[ci] base=${base}"
            echo "[ci] head=${head}"
            git diff -U0 "${base}...${head}" -- . ':(exclude)scripts/ops/secrets_patterns.txt' > /tmp/ci_diff.patch
          else
            # Push: diff last commit (fallback for first commit)
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              git diff -U0 HEAD~1..HEAD -- . ':(exclude)scripts/ops/secrets_patterns.txt' > /tmp/ci_diff.patch
            else
              git show -U0 --pretty=format: HEAD -- . ':(exclude)scripts/ops/secrets_patterns.txt' > /tmp/ci_diff.patch
            fi
          fi
          echo "[ci] patch_bytes=$(wc -c < /tmp/ci_diff.patch | tr -d ' ')"
          # do not print patch content

      - name: Secrets scan (pattern-based)
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] scanning /tmp/ci_diff.patch using scripts/ops/secrets_patterns.txt ..."
          test -f scripts/ops/secrets_patterns.txt
          awk 'NF && $0 !~ /^[[:space:]]*#/' scripts/ops/secrets_patterns.txt > /tmp/ci_secrets_patterns.txt
          # Do not print matches (avoid leaking); fail on any match.
          if rg -n -f /tmp/ci_secrets_patterns.txt /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] secret-like pattern detected in diff patch"
            exit 1
          fi
          echo "[OK] secrets scan passed."
