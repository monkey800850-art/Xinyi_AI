name: gate-secrets

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build diff patch
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] event=${GITHUB_EVENT_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            # PR: base...HEAD diff
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
            echo "[ci] base=${base}"
            echo "[ci] head=${head}"
            git diff -U0 "${base}...${head}" > /tmp/ci_diff.patch
          else
            # Push: diff last commit (fallback for first commit)
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              git diff -U0 HEAD~1..HEAD > /tmp/ci_diff.patch
            else
              git show -U0 --pretty=format: HEAD > /tmp/ci_diff.patch
            fi
          fi
          echo "[ci] patch_bytes=$(wc -c < /tmp/ci_diff.patch | tr -d ' ')"
          # do not print patch content

      - name: Secrets scan (pattern-based)
        shell: bash
        run: |
          set -euo pipefail
          # Patterns (keep tight, avoid noisy false positives)
          PAT_PRIVATE_KEY='BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY'
          PAT_GHP='ghp_[A-Za-z0-9]{20,}'
          PAT_OPENAI='sk-[A-Za-z0-9]{20,}'
          PAT_SLACK='xox[baprs]-[A-Za-z0-9-]{10,}'
          PAT_AWS1='AKIA[0-9A-Z]{16}'
          PAT_AWS2='ASIA[0-9A-Z]{16}'
          PAT_BEARER='Authorization:\s*Bearer\s+[A-Za-z0-9\._-]{10,}'

          echo "[ci] scanning /tmp/ci_diff.patch ..."
          hit=0

          if rg -n "${PAT_PRIVATE_KEY}" /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] detected private key material pattern"
            hit=1
          fi
          if rg -n "${PAT_GHP}" /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] detected GitHub token-like pattern (ghp_)"
            hit=1
          fi
          if rg -n "${PAT_OPENAI}" /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] detected OpenAI key-like pattern (sk-)"
            hit=1
          fi
          if rg -n "${PAT_SLACK}" /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] detected Slack token-like pattern (xox*)"
            hit=1
          fi
          if rg -n "${PAT_AWS1}" /tmp/ci_diff.patch >/dev/null || rg -n "${PAT_AWS2}" /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] detected AWS access key id-like pattern (AKIA/ASIA)"
            hit=1
          fi
          if rg -n "${PAT_BEARER}" /tmp/ci_diff.patch >/dev/null; then
            echo "[FAIL] detected Bearer token-like pattern"
            hit=1
          fi

          if [[ "$hit" -eq 1 ]]; then
            echo "[ci] secrets scan failed."
            exit 1
          fi

          echo "[OK] secrets scan passed."
