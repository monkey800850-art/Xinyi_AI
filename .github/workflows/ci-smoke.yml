name: ci-smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      # Ensure proxy bypass for curl in workflows
      NO_PROXY_OPT: "--noproxy '*'"
      HOST: "127.0.0.1"
      PORT: "5000"
      BASE_URL: "http://127.0.0.1:5000"
      # Avoid secrets in CI by design; authenticated smokes are local-only.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          else
            echo "[WARN] requirements.txt not found; skipping pip install"
          fi

      - name: Prepare runtime dirs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p var/run var/log

      - name: Start app (dev)
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/start_app.sh | tee /tmp/evidence_start_app.txt

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ops/health_check.sh | tee /tmp/evidence_health_check.txt

      - name: Dashboard smoke (anonymous)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x scripts/ops/smoke_dashboard.sh ]]; then
            bash scripts/ops/smoke_dashboard.sh | tee /tmp/evidence_smoke_dashboard.txt
          else
            echo "[SKIP] smoke_dashboard.sh missing" | tee /tmp/evidence_smoke_dashboard.txt
          fi

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-evidence
          path: |
            /tmp/evidence_start_app.txt
            /tmp/evidence_health_check.txt
            /tmp/evidence_smoke_dashboard.txt
