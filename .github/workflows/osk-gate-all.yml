name: osk-gate-all
on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure executable
        run: |
          chmod +x ops-safety-kit/scripts/*.sh || true
          chmod +x ops-safety-kit/.githooks/pre-commit || true

      - name: Run OSK gate_all (local profile)
        run: |
          OSK_PROFILE=local bash ops-safety-kit/scripts/gate_all.sh
      - name: Payroll offline UAT (no deps)
        run: python3 scripts/payroll/uat_payroll_mvp_offline.py

      - name: Install deps for full payroll UAT
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Payroll full UAT (best-effort)
        continue-on-error: true
        run: python3 scripts/payroll/uat_payroll_mvp.py
