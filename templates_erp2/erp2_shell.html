<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>心易智能 ERP V2</title>
  <style>
    body{margin:0;height:100vh;display:flex;font-family:Arial,Helvetica,sans-serif;background:#f3f4f6;}
    #side{width:320px;background:#111827;color:#fff;overflow:auto;padding:12px;}
    #top{position:sticky;top:0;background:#0b1220;padding:10px;border-bottom:1px solid rgba(255,255,255,.12);z-index:2;}
    #side h2{margin:6px 0 10px 0;font-size:18px;}
    .muted{color:#9ca3af;font-size:12px}
    .sec{margin:10px 0 14px 0}
    .sec-title{font-size:13px;opacity:.95;margin:10px 0 6px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:6px;}
    a.item{display:block;color:#d1d5db;text-decoration:none;padding:6px 8px;border-radius:8px;font-size:13px;word-break:break-all}
    a.item:hover{background:rgba(255,255,255,.08)}
    a.item.active{background:rgba(59,130,246,.25);color:#fff}
    #main{flex:1;overflow:auto;padding:14px 16px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    select,input,textarea,button{font-size:13px;padding:8px;border-radius:10px;border:1px solid #d1d5db;background:#fff}
    button{cursor:pointer}
    textarea{width:100%;min-height:120px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    pre{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px;overflow:auto;min-height:220px}
    .badge{display:inline-block;background:#111827;color:#fff;border-radius:999px;padding:2px 10px;font-size:12px}
  </style>
</head>
<body>
  <div id="side">
    <div id="top">
      <h2>ERP V2</h2>
      <div class="muted">独立于旧版：/erp2</div>
      <div class="muted">Catalog：<span class="badge">/erp2/catalog.json</span></div>
      <div class="row" style="margin-top:10px">
        <input id="q" placeholder="搜索 API / 菜单" style="flex:1;min-width:180px"/>
        <button id="reload">刷新</button>
      </div>
    </div>
    <div id="menu"></div>
  </div>
  <div id="main">
    <div class="row"><div class="badge" id="cur">未选择</div><span class="muted" id="hint"></span></div>
    <div class="row">
      <select id="m"><option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option></select>
      <input id="p" style="flex:1;min-width:420px" placeholder="/api/..." />
      <button id="send">发送</button><button id="copy">复制 curl</button>
    </div>
    <textarea id="b" placeholder='JSON body（GET 可留空）'></textarea>
    <div class="row"><div class="badge" id="st">-</div><span class="muted" id="rt">-</span></div>
    <pre id="out">选择左侧菜单后点击发送（V2 先把 133 API 全部“可点可测”）。</pre>
  </div>
  <script src="/erp2/static/erp2_runtime.js"></script>

<!-- =======================
     ERP2 Runner Panel (TASK-ERP2-03-B)
     ======================= -->
<div id="erp2_runner" style="border:1px solid #ddd; padding:12px; border-radius:8px; margin-top:12px;">
  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <label>Method</label>
    <select id="erp2_req_method">
      <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option>
    </select>
    <label>Path</label>
    <input id="erp2_req_path" style="min-width:320px; flex:1;" placeholder="/api/..." />
    <button id="erp2_send">发送</button>
<button id="erp2_fill_example" type="button" style="margin-left:6px;">填充示例</button>
  </div>

  <div style="margin-top:10px;">
    <div style="font-size:12px; color:#666; margin-bottom:6px;">JSON Body（GET 可留空；将自动校验与记忆）</div>
    <textarea id="erp2_req_body" style="width:100%; height:160px; font-family:monospace;"></textarea>
    <div id="erp2_err" style="color:#b00020; margin-top:6px;"></div>
  </div>

  <div style="margin-top:10px;">
    <div id="erp2_resp_meta" style="font-size:12px; color:#444; margin-bottom:6px;"></div>
    <pre id="erp2_resp_body" style="width:100%; min-height:140px; background:#fafafa; border:1px solid #eee; padding:10px; border-radius:6px; overflow:auto;"></pre>
  </div>
</div>



<!-- =======================
ERP2_BUSINESS_NAV
======================= -->

<div style="margin-top:20px">

<h2>业务入口</h2>

<div style="display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px">

<a href="/erp2/books"
style="padding:14px;border:1px solid #ddd;border-radius:8px;text-decoration:none">
建账
</a>

<a href="/erp2/subjects"
style="padding:14px;border:1px solid #ddd;border-radius:8px;text-decoration:none">
会计科目
</a>

<a href="/erp2/opening"
style="padding:14px;border:1px solid #ddd;border-radius:8px;text-decoration:none">
期初数据
</a>

<a href="/erp2/vouchers"
style="padding:14px;border:1px solid #ddd;border-radius:8px;text-decoration:none">
凭证录入
</a>

<a href="/erp2/reports/trial_balance"
style="padding:14px;border:1px solid #ddd;border-radius:8px;text-decoration:none">
余额表
</a>

<a href="/erp2/reports"
style="padding:14px;border:1px solid #ddd;border-radius:8px;text-decoration:none">
报表中心
</a>

</div>
</div>

</body>
</html>
